
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>합격 조회 결과</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;800&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Noto Sans KR',sans-serif;background:#f5f5f5}
.panel{padding:30px}
.cert{
 width:210mm;
 height:297mm;
 margin:20px auto;
 padding:40mm 25mm;
 border:2px solid #165F9C;
 position:relative;
 background:white;
}
.cert h1{text-align:center;font-size:26px;margin-bottom:30px}
.cert table{width:100%;border-collapse:collapse;margin-top:20px}
.cert td{border-bottom:1px solid #aaa;padding:8px}
.cert .content-text{margin-top:40px;font-size:16px;line-height:1.8}
.cert .sign{position:absolute;right:40mm;bottom:45mm;text-align:right}
.cert .stamp{
 position:absolute;
 right:30mm;
 bottom:25mm;
 width:35mm;
 opacity:0.9;
}
@media print{
 body{margin:0}
 .panel>*:not(.cert){display:none}
}
</style>
</head>
<body>
<div class="panel">
<div class="cert" id="certificate"></div>
</div>
<script>
const DATA={
 "10714":{name:"오제영",birth:"090320",track:"학생회도우미",unit:"언론홍보부",pos:"도우미",result:"pass"},
 "10715":{name:"이재하",birth:"090824",track:"학생회도우미",unit:"언론홍보부",pos:"도우미",result:"fail"},
 "10716":{name:"정소윤",birth:"080101",track:"학생회도우미",unit:"기획재정부",pos:"도우미",result:"pass"},
 "10717":{name:"이예준",birth:"080102",track:"학생회도우미",unit:"문화체육부",pos:"도우미",result:"pass"},
 "10718":{name:"정주연",birth:"080103",track:"학생회도우미",unit:"교육기획부",pos:"도우미",result:"pass"}
};

const p=new URLSearchParams(location.search);
const sid=p.get("sid");
const birth=p.get("birth");
const name=p.get("name");

if(DATA[sid] && DATA[sid].birth===birth && DATA[sid].name===name && DATA[sid].result==="pass"){
 const d=DATA[sid];
 document.getElementById("certificate").innerHTML=`
   <h1>계남고등학교 제31대 학생회 도우미 합격통지서</h1>
   <table>
     <tr><td>성명</td><td>${d.name}</td></tr>
     <tr><td>학번</td><td>${sid}</td></tr>
     <tr><td>생년월일</td><td>${d.birth}</td></tr>
     <tr><td>지원분야</td><td>${d.track}</td></tr>
     <tr><td>모집단위</td><td>${d.unit}</td></tr>
     <tr><td>직위</td><td>${d.pos}</td></tr>
   </table>
   <div class="content-text">
     위 사람은 계남고등학교 제31대 학생회 도우미 선발에<br>
     최종 합격하였음을 통지합니다.
   </div>
   <div class="sign">
     계남고등학교<br>
     전교회장 정소윤
   </div>
   <img src="stamp.png" class="stamp">
 `;
}else{
 document.body.innerHTML="<h2 style='text-align:center;margin-top:100px;'>합격자가 아닙니다.</h2>";
}
</script>
</body>
</html>
